version: "3.8"

services:
  tandoor-importer:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT}:8000"
    volumes:
      - "${DATA_PATH}:/app/data"
    environment:
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - DB_PATH=${DB_PATH}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
