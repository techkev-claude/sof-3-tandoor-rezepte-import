<!DOCTYPE html>
<html lang="de" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tandoor Recipe Importer</title>
  <!-- Muss vor dem CSS-Link stehen, damit kein heller Aufblitz entsteht -->
  <script>
    (function(){
      var t=localStorage.getItem('theme');
      if(!t) t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      document.documentElement.setAttribute('data-bs-theme',t);
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
  </style>
</head>
<body class="bg-body">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">Tandoor Recipe Importer</a>
      <div>
        <button id="theme-toggle" class="btn btn-outline-light btn-sm me-2"
                title="Dark Mode umschalten" onclick="toggleTheme()">
          <span id="theme-icon"></span>
        </button>
        <a href="/settings" class="btn btn-outline-light btn-sm me-2">Einstellungen</a>
        <a href="/logout" class="btn btn-outline-danger btn-sm">Abmelden</a>
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleTheme() {
      var root = document.documentElement;
      var next = root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-bs-theme', next);
      localStorage.setItem('theme', next);
      updateIcon(next);
    }
    function updateIcon(theme) {
      var icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    updateIcon(document.documentElement.getAttribute('data-bs-theme'));
  </script>
</body>
</html>
